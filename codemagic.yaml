workflows:
  ios_tiligo:
    name: Tiligo iOS Build & Release
    max_build_duration: 60

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tiligo.tiligo

      vars:
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"

      xcode: latest

    scripts:
      - name: Verify project structure
        script: |
          ls -R

      - name: Install dependencies (CocoaPods)
        script: |
          if [ -f "Podfile" ]; then
            pod install
          fi

      - name: Initialize keychain
        script: |
          keychain initialize

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files \
            com.tiligo.tiligo \
            --type IOS_APP_STORE \
            --create

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: tiligo_asc
        submit_to_testflight: true
        submit_to_app_store_review: false
